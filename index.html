<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:          #F5F4F0;
  --surface:     #FFFFFF;
  --surface-2:   #FAFAF8;
  --border:      #E8E5DF;
  --border-med:  #D6D2CA;
  --accent:      #111110;
  --accent-dim:  rgba(17,17,16,.06);
  --accent-dark: #000000;
  --accent-glow: rgba(17,17,16,.10);
  --tx-1:        #111110;
  --tx-2:        #6B6560;
  --tx-3:        #A9A49E;
  --white:       #FFFFFF;
  --danger:      #EF4444;
  --danger-bg:   #FEF2F2;
  --done-line:   #B8B3AC;
  --sh-xs: 0 1px 2px rgba(0,0,0,.04);
  --sh-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --sh-md: 0 4px 8px rgba(0,0,0,.06), 0 2px 4px rgba(0,0,0,.04);
  --sh-lg: 0 12px 28px rgba(0,0,0,.08), 0 4px 8px rgba(0,0,0,.04);
  --sh-xl: 0 20px 48px rgba(0,0,0,.12), 0 8px 16px rgba(0,0,0,.06);
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
  --r-full: 9999px;
  --ease: cubic-bezier(.4,0,.2,1);
  --bounce: cubic-bezier(.34,1.3,.64,1);
  --t: 160ms;
}

[data-theme="dark"]{
  --bg:         #111113;
  --surface:    #1C1C1F;
  --surface-2:  #222226;
  --border:     #2E2E33;
  --border-med: #3A3A40;
  --accent:     #F4F4F5;
  --accent-dim: rgba(244,244,245,.10);
  --accent-dark:#FFFFFF;
  --accent-glow:rgba(244,244,245,.12);
  --tx-1:       #F4F4F5;
  --tx-2:       #A1A1AA;
  --tx-3:       #52525B;
  --white:      #F4F4F5;
  --danger:     #F87171;
  --danger-bg:  rgba(248,113,113,.1);
  --done-line:  #3F3F46;
  --sh-xs: 0 1px 2px rgba(0,0,0,.3);
  --sh-sm: 0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
  --sh-md: 0 4px 8px rgba(0,0,0,.4), 0 2px 4px rgba(0,0,0,.3);
  --sh-lg: 0 12px 28px rgba(0,0,0,.5), 0 4px 8px rgba(0,0,0,.3);
  --sh-xl: 0 20px 48px rgba(0,0,0,.6), 0 8px 16px rgba(0,0,0,.4);
}

html{font-size:18px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--tx-1);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:80px 60px 120px;
  transition:background var(--t) var(--ease), color var(--t) var(--ease);
}

/* ── Layout ── */
.wrap{width:100%;max-width:980px;animation:content-fade-in 500ms ease-out 600ms both}

@keyframes content-fade-in{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* ════════════════════════════════════════
   SPLASH SCREEN — APPLE STYLE
════════════════════════════════════════ */
.splash{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  overflow:hidden;
  opacity:1;
  background:#F5F4F0;
  transition:
    opacity 520ms cubic-bezier(.4,0,.2,1),
    transform 520ms cubic-bezier(.4,0,.2,1);
}

.splash.hidden{
  opacity:0;
  transform:scale(1.015);
  pointer-events:none;
}

.splash-bg{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(255,255,255,.75) 0%, rgba(255,255,255,0) 40%),
    linear-gradient(180deg, #FAF9F6 0%, #F3F1EC 100%);
}

.splash-content{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:24px;
  animation:splash-in 700ms cubic-bezier(.22,1,.36,1) both;
}

@keyframes splash-in{
  from{
    opacity:0;
    transform:translateY(14px) scale(.985);
  }
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

.splash-appmark{
  width:96px;
  height:96px;
  border-radius:28px;
  background:rgba(255,255,255,.72);
  border:1px solid rgba(255,255,255,.88);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:24px;
  box-shadow:
    0 16px 40px rgba(17,17,16,.06),
    0 4px 10px rgba(17,17,16,.04),
    inset 0 1px 0 rgba(255,255,255,.95);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}

.splash-glyph{
  width:52px;
  height:52px;
  border-radius:16px;
  background:#111110;
  position:relative;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    0 6px 18px rgba(17,17,16,.12);
}

.splash-glyph::before,
.splash-glyph::after,
.splash-glyph span{
  content:'';
  position:absolute;
  left:13px;
  height:3px;
  border-radius:999px;
  background:#FFFFFF;
}

.splash-glyph::before{
  top:14px;
  width:25px;
}

.splash-glyph span{
  top:24px;
  width:20px;
}

.splash-glyph::after{
  top:34px;
  width:14px;
}

.splash-title{
  font-size:32px;
  line-height:1.05;
  font-weight:700;
  letter-spacing:-0.045em;
  color:#111110;
  margin-bottom:8px;
  font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
}

.splash-subtitle{
  font-size:15px;
  line-height:1.4;
  font-weight:500;
  letter-spacing:-0.01em;
  color:#6B6560;
  margin-bottom:22px;
  font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
}

.splash-loader{
  width:120px;
  height:3px;
  border-radius:999px;
  background:rgba(17,17,16,.08);
  overflow:hidden;
}

.splash-loader span{
  display:block;
  width:40%;
  height:100%;
  border-radius:inherit;
  background:#111110;
  animation:splash-load 1.35s cubic-bezier(.4,0,.2,1) infinite;
}

@keyframes splash-load{
  0%{
    transform:translateX(-120%);
  }
  100%{
    transform:translateX(320%);
  }
}

/* ── Theme toggle ── */
.theme-btn{
  position:fixed;top:20px;right:20px;
  width:38px;height:38px;border-radius:var(--r-sm);
  border:1.5px solid var(--border);
  background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--tx-2);
  box-shadow:var(--sh-sm);
  transition:all var(--t) var(--ease);
  z-index:100;
}
.theme-btn:hover{color:var(--tx-1);border-color:var(--border-med);box-shadow:var(--sh-md)}
.theme-btn:active{transform:scale(.92)}

/* ════════════════════════════════════════
   HEADER
════════════════════════════════════════ */
.hd{margin-bottom:60px}

.hd-row{
  display:flex;align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}

.hd h1{
  font-size:52px;font-weight:700;
  letter-spacing:-0.04em;line-height:1;
  color:var(--tx-1);
}

.hd-sub{font-size:20px;color:var(--tx-2);font-weight:400}

/* ── Date picker button ── */
.date-picker-wrap{position:relative}

.date-btn{
  display:flex;align-items:center;gap:9px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--r-lg);
  padding:10px 16px;
  cursor:pointer;
  box-shadow:var(--sh-sm);
  transition:all var(--t) var(--ease);
  font-family:inherit;
}
.date-btn:hover{border-color:var(--accent);box-shadow:var(--sh-md),0 0 0 3px var(--accent-glow)}
.date-btn.open{border-color:var(--accent);box-shadow:var(--sh-md),0 0 0 3px var(--accent-glow)}

.date-btn-icon{color:var(--accent);flex-shrink:0}
.date-btn-label{
  font-size:13.5px;font-weight:600;
  color:var(--tx-1);letter-spacing:.01em;
  white-space:nowrap;
}
.date-btn-badge{
  font-size:11px;font-weight:600;
  background:var(--accent-dim);
  color:var(--accent);
  border-radius:var(--r-full);
  padding:2px 8px;
  letter-spacing:.02em;
}
.date-btn-chevron{
  color:var(--tx-3);flex-shrink:0;
  transition:transform var(--t) var(--ease);
}
.date-btn.open .date-btn-chevron{transform:rotate(180deg)}

/* ════════════════════════════════════════
   CALENDAR POPOVER
════════════════════════════════════════ */
.cal-popover{
  position:absolute;
  top:calc(100% + 10px);
  right:0;
  width:320px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--r-xl);
  box-shadow:var(--sh-xl);
  padding:20px;
  z-index:500;
  transform-origin:top right;

  /* hidden state */
  opacity:0;
  transform:scale(.94) translateY(-6px);
  pointer-events:none;
  transition:opacity 180ms var(--ease), transform 180ms var(--bounce);
}
.cal-popover.visible{
  opacity:1;
  transform:scale(1) translateY(0);
  pointer-events:auto;
}

/* nav */
.cal-nav{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.cal-nav-btn{
  width:30px;height:30px;border-radius:var(--r-sm);
  border:none;background:transparent;
  cursor:pointer;color:var(--tx-2);
  display:flex;align-items:center;justify-content:center;
  transition:all var(--t) var(--ease);
}
.cal-nav-btn:hover{background:var(--surface-2);color:var(--tx-1)}
.cal-month-label{font-size:15px;font-weight:600;color:var(--tx-1)}

/* weekdays */
.cal-wdays{
  display:grid;grid-template-columns:repeat(7,1fr);
  margin-bottom:6px;
}
.cal-wday{
  text-align:center;font-size:10.5px;font-weight:600;
  letter-spacing:.05em;text-transform:uppercase;
  color:var(--tx-3);padding:4px 0;
}

/* grid */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}

.cal-day{
  height:36px;border-radius:var(--r-sm);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;
  font-size:13px;font-weight:500;
  color:var(--tx-1);
  transition:all var(--t) var(--ease);
  position:relative;user-select:none;
}
.cal-day:hover:not(.selected){background:var(--surface-2)}
.cal-day.other-month{color:var(--tx-3)}
.cal-day.today:not(.selected){
  font-weight:700;color:var(--accent);
  box-shadow:0 0 0 1.5px var(--accent);
}
.cal-day.selected{
  background:var(--accent);color:#fff;
  font-weight:600;
  box-shadow:0 2px 8px var(--accent-glow);
}
.cal-dot{
  width:4px;height:4px;border-radius:50%;
  background:var(--accent);
  position:absolute;bottom:3px;
}
.cal-day.selected .cal-dot{background:rgba(255,255,255,.75)}

/* today shortcut */
.cal-footer{
  margin-top:14px;padding-top:14px;
  border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.cal-today-btn{
  font-family:inherit;font-size:12.5px;font-weight:600;
  color:var(--accent);background:var(--accent-dim);
  border:none;border-radius:var(--r-sm);
  padding:6px 12px;cursor:pointer;
  transition:all var(--t) var(--ease);
}
.cal-today-btn:hover{background:var(--accent);color:#fff}
.cal-sel-label{font-size:12px;color:var(--tx-3)}

/* progress */
.prog{margin-top:22px}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.prog-label{font-size:11.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--tx-3)}
.prog-frac{font-size:12px;font-weight:600;color:var(--accent)}
.prog-track{height:3px;background:var(--border);border-radius:var(--r-full);overflow:hidden}
.prog-fill{
  height:100%;background:linear-gradient(90deg,var(--accent) 0%,#818CF8 100%);
  border-radius:var(--r-full);width:0%;transition:width 380ms var(--ease);
}


/* ════════════════════════════════════════
   CALENDAR-FIRST PLANNER
════════════════════════════════════════ */
.planner{
  margin-top:28px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:28px;
  padding:22px;
  box-shadow:var(--sh-md);
}

.planner-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin-bottom:18px;
}

.planner-title{
  display:flex;
  flex-direction:column;
  gap:3px;
}

.planner-kicker{
  font-size:11px;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--tx-3);
}

.planner-month{
  font-size:24px;
  font-weight:700;
  letter-spacing:-.04em;
  color:var(--tx-1);
}

.planner-actions{
  display:flex;
  align-items:center;
  gap:8px;
}

.planner-nav,
.planner-today{
  height:38px;
  border:none;
  border-radius:13px;
  background:var(--surface-2);
  color:var(--tx-2);
  font-family:inherit;
  font-size:13px;
  font-weight:650;
  cursor:pointer;
  transition:all var(--t) var(--ease);
}

.planner-nav{
  width:38px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.planner-today{
  padding:0 14px;
}

.planner-nav:hover,
.planner-today:hover{
  color:var(--tx-1);
  background:var(--accent-dim);
}

.planner-weekdays{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-bottom:8px;
}

.planner-weekdays span{
  text-align:center;
  font-size:11px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--tx-3);
  padding:4px 0;
}

.planner-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.plan-day{
  min-height:82px;
  border-radius:18px;
  border:1.5px solid transparent;
  background:var(--surface-2);
  padding:10px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition:all var(--t) var(--ease);
  position:relative;
  overflow:hidden;
}

.plan-day:hover{
  border-color:var(--border-med);
  transform:translateY(-1px);
}

.plan-day.other{
  opacity:.38;
}

.plan-day.past{
  background:transparent;
  border-color:var(--border);
}

.plan-day.today{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}

.plan-day.selected{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
  box-shadow:0 12px 24px rgba(79,70,229,.22);
}

.plan-day-num{
  font-size:14px;
  font-weight:700;
  color:var(--tx-1);
}

.plan-day.selected .plan-day-num{
  color:#fff;
}

.plan-day-meta{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}

.plan-count{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:22px;
  height:22px;
  padding:0 7px;
  border-radius:999px;
  background:var(--accent-dim);
  color:var(--accent);
  font-size:11px;
  font-weight:800;
}

.plan-day.selected .plan-count{
  background:rgba(255,255,255,.22);
  color:#fff;
}

.plan-label{
  font-size:10.5px;
  font-weight:650;
  color:var(--tx-3);
  white-space:nowrap;
}

.plan-day.selected .plan-label{
  color:rgba(255,255,255,.8);
}

.plan-day.past .plan-label::before{
  content:'View';
}

.plan-day:not(.past) .plan-label::before{
  content:'Plan';
}

.input-lock{
  display:none;
  align-items:center;
  gap:8px;
  margin:-8px 0 16px;
  padding:12px 14px;
  border-radius:var(--r-md);
  background:var(--surface-2);
  border:1px solid var(--border);
  color:var(--tx-2);
  font-size:13px;
  font-weight:550;
}

.input-lock.visible{
  display:flex;
}

.input-card.locked{
  opacity:.58;
  pointer-events:none;
}

.input-card.locked .ti::placeholder{
  color:var(--tx-3);
}

@media(max-width:600px){
  .planner{
    margin-top:22px;
    padding:16px;
    border-radius:22px;
  }

  .planner-head{
    align-items:flex-start;
  }

  .planner-month{
    font-size:20px;
  }

  .planner-grid,
  .planner-weekdays{
    gap:4px;
  }

  .plan-day{
    min-height:64px;
    border-radius:14px;
    padding:8px;
  }

  .plan-label{
    display:none;
  }

  .plan-count{
    min-width:18px;
    height:18px;
    padding:0 5px;
    font-size:10px;
  }
}

/* ── Input card ── */
.input-card{
  display:flex;align-items:center;gap:16px;
  background:var(--surface);border-radius:var(--r-lg);
  border:1.5px solid transparent;box-shadow:var(--sh-md);
  padding:12px 12px 12px 28px;margin-bottom:24px;
  transition:border-color var(--t) var(--ease), box-shadow var(--t) var(--ease);
}
.input-card:focus-within{
  border-color:var(--accent);
  box-shadow:var(--sh-lg), 0 0 0 4px var(--accent-glow);
}
.ic-plus{flex-shrink:0;color:var(--tx-3);transition:color var(--t) var(--ease)}
.input-card:focus-within .ic-plus{color:var(--accent)}
.ti{
  flex:1;border:none;outline:none;background:transparent;
  font-family:inherit;font-size:18px;font-weight:400;
  color:var(--tx-1);padding:18px 0;caret-color:var(--accent);
}
.ti::placeholder{color:var(--tx-3)}
.btn-add{
  flex-shrink:0;background:var(--accent);color:var(--white);
  border:none;border-radius:var(--r-md);padding:16px 36px;
  font-family:inherit;font-size:16px;font-weight:600;letter-spacing:-0.01em;
  cursor:pointer;box-shadow:0 2px 8px rgba(79,70,229,.25);
  transition:background var(--t) var(--ease), box-shadow var(--t) var(--ease), transform 80ms var(--ease);
}
.btn-add:hover{background:var(--accent-dark);box-shadow:0 4px 14px rgba(79,70,229,.35)}
.btn-add:active{transform:scale(.96)}

/* ── List ── */
.list{display:flex;flex-direction:column;gap:8px}

/* ── Item ── */
.item{
  position:relative;display:flex;align-items:center;gap:20px;
  background:var(--surface);border-radius:var(--r-md);
  border:1.5px solid transparent;padding:0 20px 0 28px;
  transition:border-color var(--t) var(--ease), box-shadow var(--t) var(--ease);
  animation:drop 180ms var(--ease) both;
  min-height:80px;
}
@keyframes drop{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.item:hover{border-color:var(--border);box-shadow:var(--sh-sm)}
.item.done{background:var(--surface-2)}
.item.bye{animation:bye 180ms var(--ease) both!important}
@keyframes bye{
  from{opacity:1;transform:translateX(0);max-height:80px;margin-bottom:0}
  to{opacity:0;transform:translateX(12px);max-height:0;margin-bottom:-8px}
}

/* checkbox */
.cb-wrap{flex-shrink:0;position:relative;width:22px;height:22px}
.cb-wrap input{position:absolute;opacity:0;width:0;height:0}
.cb-face{
  position:absolute;inset:0;border:2px solid var(--border-med);
  border-radius:6px;background:var(--surface);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--t) var(--ease);
}
.cb-wrap:hover .cb-face{border-color:var(--accent);background:var(--accent-dim)}
.cb-wrap input:checked + .cb-face{background:var(--accent);border-color:var(--accent);box-shadow:0 2px 6px rgba(79,70,229,.3)}
.cb-wrap input:checked + .cb-face::after{
  content:'';display:block;width:5px;height:9px;
  border:2px solid #fff;border-top:none;border-left:none;
  transform:rotate(45deg) translate(0,-1px);
}
.cb-wrap input:focus-visible + .cb-face{outline:2px solid var(--accent);outline-offset:2px}

/* text */
.tx{
  flex:1;font-size:20px;font-weight:500;color:var(--tx-1);
  padding:26px 0;line-height:1.6;word-break:break-word;
  transition:color var(--t) var(--ease), text-decoration-color var(--t) var(--ease);
  cursor:pointer;
}
.item.done .tx{color:var(--tx-3);text-decoration:line-through;text-decoration-color:var(--done-line)}

/* edit input */
.edit-input{
  flex:1;border:none;outline:none;background:transparent;
  font-family:inherit;font-size:20px;font-weight:500;color:var(--tx-1);
  padding:26px 0;line-height:1.6;caret-color:var(--accent);min-width:0;
}

/* item actions */
.item-actions{display:flex;align-items:center;gap:8px;opacity:0;transition:opacity var(--t) var(--ease)}
.item:hover .item-actions,.item.editing .item-actions{opacity:1}
.act-btn{
  flex-shrink:0;border:none;background:transparent;
  width:42px;height:42px;border-radius:var(--r-md);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--tx-3);transition:all var(--t) var(--ease);
}
.act-btn.edit:hover{background:var(--accent-dim);color:var(--accent)}
.act-btn.del:hover{background:var(--danger-bg);color:var(--danger)}
.act-btn.save:hover{background:var(--accent-dim);color:var(--accent)}
.act-btn.cancel:hover{background:var(--danger-bg);color:var(--danger)}

/* ── Divider ── */
.divider{display:flex;align-items:center;gap:12px;margin:12px 0 6px}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-tag{font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--tx-3)}

/* ── Footer ── */
.ft{display:flex;justify-content:space-between;align-items:center;margin-top:22px;padding:0 4px}
.ft-left{font-size:15px;color:var(--tx-3)}
.ft-left b{font-weight:600;color:var(--tx-2)}
.btn-clear{
  font-family:inherit;font-size:15px;font-weight:500;
  color:var(--tx-3);background:transparent;border:none;
  padding:5px 10px;border-radius:var(--r-sm);cursor:pointer;
  transition:all var(--t) var(--ease);
}
.btn-clear:hover:not(:disabled){color:var(--danger);background:var(--danger-bg)}
.btn-clear:disabled{opacity:.35;cursor:default}

/* ── Empty ── */
.empty{
  text-align:center;padding:64px 32px;
  background:var(--surface);border-radius:var(--r-lg);
  animation:drop 220ms var(--ease) both;
}
.empty-icon{width:44px;height:44px;margin:0 auto 16px;color:var(--tx-3);opacity:.45}
.empty-h{font-size:17px;font-weight:600;color:var(--tx-2);letter-spacing:-0.01em;margin-bottom:6px}
.empty-p{font-size:15px;color:var(--tx-3);line-height:1.55}

    height:auto !important;
  }
}

/* Calendar badges should visually read as remaining unfinished tasks */
.plan-count{
  font-variant-numeric:tabular-nums;
}

.plan-count::after{
  content:'';
}


/* ════════════════════════════════════════
   FINAL BUTTON HIERARCHY
   Black only for Add + selected calendar day
════════════════════════════════════════ */

/* Main action only */
.btn-add{
  background:#111110 !important;
  color:#FFFFFF !important;
  border-color:#111110 !important;
  box-shadow:0 10px 22px rgba(17,17,16,.12) !important;
}

.btn-add:hover{
  background:#000000 !important;
  color:#FFFFFF !important;
}

[data-theme="dark"] .btn-add{
  background:#F5F5F7 !important;
  color:#111110 !important;
  border-color:#F5F5F7 !important;
  box-shadow:0 12px 28px rgba(0,0,0,.38) !important;
}

/* Selected day in calendar stays the strong visual focus */
.plan-day.selected{
  background:#111110 !important;
  color:#FFFFFF !important;
  border-color:#111110 !important;
  box-shadow:0 18px 34px rgba(17,17,16,.18) !important;
}

.plan-day.selected .plan-day-num,
.plan-day.selected .plan-label{
  color:#FFFFFF !important;
}

.plan-day.selected .plan-count{
  background:#FFFFFF !important;
  color:#111110 !important;
}

[data-theme="dark"] .plan-day.selected{
  background:#F5F5F7 !important;
  color:#111110 !important;
  border-color:#F5F5F7 !important;
  box-shadow:0 18px 34px rgba(0,0,0,.42) !important;
}

[data-theme="dark"] .plan-day.selected .plan-day-num,
[data-theme="dark"] .plan-day.selected .plan-label{
  color:#111110 !important;
}

[data-theme="dark"] .plan-day.selected .plan-count{
  background:#111110 !important;
  color:#FFFFFF !important;
}

/* Today + arrows become secondary controls */
.planner-nav,
.planner-today{
  background:rgba(17,17,16,.06) !important;
  color:#111110 !important;
  border:1px solid rgba(17,17,16,.08) !important;
  box-shadow:none !important;
}

.planner-nav:hover,
.planner-today:hover{
  background:rgba(17,17,16,.11) !important;
  color:#111110 !important;
  transform:translateY(-1px);
}

[data-theme="dark"] .planner-nav,
[data-theme="dark"] .planner-today{
  background:rgba(245,245,247,.08) !important;
  color:#F5F5F7 !important;
  border:1px solid rgba(245,245,247,.11) !important;

}

[data-theme="dark"] .planner-nav:hover,
[data-theme="dark"] .planner-today:hover{

}

/* Status pill is a quiet label, not a primary button */
.panel-pill{
  background:rgba(17,17,16,.07) !important;

  border:1px solid rgba(17,17,16,.08) !important;

}

/* Keep past message readable */
.input-lock{
  opacity:1 !important;
  background:#F3F0EA !important;
  border:1px solid #DED8CE !important;
  color:#4D4842 !important;
  font-weight:650 !important;

}

.input-lock::before{

  width:8px;

[data-theme="dark"] .input-lock{

  border-color:#4A4A4D !important;

}

[data-theme="dark"] .input-lock::before{

  opacity:.9;
}

/* Past days clearer in dark mode */
[data-theme="dark"] .plan-day.past{

  color:#B8B8BD !important;

}

[data-theme="dark"] .plan-day.past .plan-day-num,
[data-theme="dark"] .plan-day.past .plan-label{
  color:#B8B8BD !important;
}

</style>
</head>

<script>
// ── Helpers ──────────────────────────────────────────────────────
function toISO(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Theme ────────────────────────────────────────────────────────
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('tsks_theme', t);
  document.getElementById('icon-moon').style.display = t === 'light' ? '' : 'none';
  document.getElementById('icon-sun').style.display  = t === 'dark'  ? '' : 'none';
}
applyTheme(localStorage.getItem('tsks_theme') || 'light');
document.getElementById('theme-btn').addEventListener('click', () => {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
});

// ── State ────────────────────────────────────────────────────────
let tasks = JSON.parse(localStorage.getItem('tsks') || '[]');
const todayISO = toISO(new Date());
tasks.forEach(t => { if (!t.date) t.date = todayISO; });

let selectedDate = todayISO;
let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth();
let popoverOpen = false;

const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAYS_S = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MOS    = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

// ── Persist ──────────────────────────────────────────────────────
function save() { localStorage.setItem('tsks', JSON.stringify(tasks)); }

// ── Popover ──────────────────────────────────────────────────────
const dateBtn    = document.getElementById('date-btn');
const calPopover = document.getElementById('cal-popover');

function openPopover() {
  popoverOpen = true;
  dateBtn.classList.add('open');
  dateBtn.setAttribute('aria-expanded', 'true');
  calPopover.classList.add('visible');
}
function closePopover() {
  popoverOpen = false;
  dateBtn.classList.remove('open');
  dateBtn.setAttribute('aria-expanded', 'false');
  calPopover.classList.remove('visible');
}

dateBtn.addEventListener('click', e => {
  e.stopPropagation();
  popoverOpen ? closePopover() : openPopover();
});

document.addEventListener('click', e => {
  if (popoverOpen && !calPopover.contains(e.target) && e.target !== dateBtn) closePopover();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape' && popoverOpen) closePopover(); });

// ── Calendar ─────────────────────────────────────────────────────

function isPastDate(iso) {
  return new Date(iso + 'T00:00:00') < new Date(todayISO + 'T00:00:00');
}

function selectDate(iso, year, month) {
  selectedDate = iso;
  calYear = year;
  calMonth = month;
  renderCal();
  renderPlannerCalendar();
  updateDateBtn();
  renderHeader();
  render();
}

function renderPlannerCalendar() {
  const monthLabel = document.getElementById('planner-month');
  const grid = document.getElementById('planner-grid');
  if (!monthLabel || !grid) return;

  monthLabel.textContent = MONTHS[calMonth] + ' ' + calYear;
  grid.innerHTML = '';

  const firstDay    = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrev  = new Date(calYear, calMonth, 0).getDate();

  const cells = [];
  for (let i = firstDay - 1; i >= 0; i--)
    cells.push({ d: daysInPrev - i, m: calMonth - 1, y: calYear, other: true });
  for (let d = 1; d <= daysInMonth; d++)
    cells.push({ d, m: calMonth, y: calYear, other: false });
  while (cells.length < 42)
    cells.push({ d: cells.length - firstDay - daysInMonth + 1, m: calMonth + 1, y: calYear, other: true });

  cells.forEach(cell => {
    const realM = ((cell.m % 12) + 12) % 12;
    const realY = cell.y + Math.floor(cell.m / 12);
    const iso   = realY + '-' + String(realM + 1).padStart(2, '0') + '-' + String(cell.d).padStart(2, '0');
    const count = tasks.filter(t => t.date === iso && !t.d).length;

    const el = document.createElement('button');
    el.type = 'button';
    el.className = 'plan-day' +
      (cell.other ? ' other' : '') +
      (isPastDate(iso) ? ' past' : '') +
      (iso === todayISO ? ' today' : '') +
      (iso === selectedDate ? ' selected' : '');

    el.innerHTML = `
      <span class="plan-day-num">${cell.d}</span>
      <span class="plan-day-meta">
        ${count ? `<span class="plan-count">${count}</span>` : '<span></span>'}
        <span class="plan-label"></span>
      </span>`;

    el.addEventListener('click', () => selectDate(iso, realY, realM));
    grid.appendChild(el);
  });
}

function updateInputLock() {
  const inputCard = document.getElementById('input-card');
  const inputLock = document.getElementById('input-lock');
  const taskInput = document.getElementById('ti');
  const addBtn = document.getElementById('btn-add');
  const locked = isPastDate(selectedDate);

  if (!inputCard || !inputLock || !taskInput || !addBtn) return;

  inputCard.classList.toggle('locked', locked);
  inputLock.classList.toggle('visible', locked);
  taskInput.disabled = locked;
  addBtn.disabled = locked;
  taskInput.placeholder = locked ? 'Past days are view-only' : 'Add a new task...';
}

function renderCal() {
  document.getElementById('cal-month').textContent = MONTHS[calMonth] + ' ' + calYear;

  const firstDay    = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrev  = new Date(calYear, calMonth, 0).getDate();

  const cells = [];
  for (let i = firstDay - 1; i >= 0; i--)
    cells.push({ d: daysInPrev - i, m: calMonth - 1, y: calYear, other: true });
  for (let d = 1; d <= daysInMonth; d++)
    cells.push({ d, m: calMonth, y: calYear, other: false });
  while (cells.length < 42)
    cells.push({ d: cells.length - firstDay - daysInMonth + 1, m: calMonth + 1, y: calYear, other: true });

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  cells.forEach(cell => {
    const realM = ((cell.m % 12) + 12) % 12;
    const realY = cell.y + Math.floor(cell.m / 12);
    const iso   = realY + '-' + String(realM + 1).padStart(2, '0') + '-' + String(cell.d).padStart(2, '0');
    const count = tasks.filter(t => t.date === iso && !t.d).length;

    const el = document.createElement('div');
    el.className = 'cal-day' +
      (cell.other      ? ' other-month' : '') +
      (iso === todayISO   ? ' today'    : '') +
      (iso === selectedDate ? ' selected' : '');
    el.innerHTML = `<span>${cell.d}</span>${count ? '<span class="cal-dot"></span>' : ''}`;
    el.title = iso + (count ? ` · ${count} task${count > 1 ? 's' : ''}` : '');

    el.addEventListener('click', () => {
      selectDate(iso, realY, realM);
      closePopover();
    });
    grid.appendChild(el);
  });

  // selected label in footer
  const sel = new Date(selectedDate + 'T12:00:00');
  document.getElementById('cal-sel-label').textContent =
    DAYS_S[sel.getDay()] + ', ' + MOS[sel.getMonth()] + ' ' + sel.getDate();
}

document.getElementById('cal-prev').addEventListener('click', e => {
  e.stopPropagation();
  calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCal();
  renderPlannerCalendar();
});
document.getElementById('cal-next').addEventListener('click', e => {
  e.stopPropagation();
  calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCal();
  renderPlannerCalendar();
});
document.getElementById('cal-today-btn').addEventListener('click', e => {
  e.stopPropagation();
  const now = new Date();
  selectDate(todayISO, now.getFullYear(), now.getMonth());
  closePopover();
});


document.getElementById('planner-prev').addEventListener('click', () => {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCal();
  renderPlannerCalendar();
});

document.getElementById('planner-next').addEventListener('click', () => {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCal();
  renderPlannerCalendar();
});

document.getElementById('planner-today').addEventListener('click', () => {
  const now = new Date();
  selectDate(todayISO, now.getFullYear(), now.getMonth());
});

document.addEventListener('keydown', e => {
  if (e.target && ['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
  if (e.key === 'ArrowLeft') {
    const d = new Date(selectedDate + 'T12:00:00');
    d.setDate(d.getDate() - 1);
    selectDate(toISO(d), d.getFullYear(), d.getMonth());
  }
  if (e.key === 'ArrowRight') {
    const d = new Date(selectedDate + 'T12:00:00');
    d.setDate(d.getDate() + 1);
    selectDate(toISO(d), d.getFullYear(), d.getMonth());
  }
});

// ── Date button label ────────────────────────────────────────────
function updateDateBtn() {
  const d     = new Date(selectedDate + 'T12:00:00');
  const isToday = selectedDate === todayISO;
  const label = DAYS_S[d.getDay()] + ', ' + MOS[d.getMonth()] + ' ' + d.getDate();

  document.getElementById('date-btn-label').textContent = label;
  const badge = document.getElementById('date-btn-badge');
  if (isToday) {
    badge.textContent = 'Today';
    badge.style.display = '';
  } else {
    const diff = Math.round((new Date(selectedDate) - new Date(todayISO)) / 86400000);
    if (diff === 1)       { badge.textContent = 'Tomorrow'; badge.style.display = ''; }
    else if (diff === -1) { badge.textContent = 'Yesterday'; badge.style.display = ''; }
    else                  { badge.style.display = 'none'; }
  }
}


function updateDayPanel() {
  const title = document.getElementById('panel-title');
  const pill = document.getElementById('panel-pill');
  if (!title || !pill) return;

  const d = new Date(selectedDate + 'T12:00:00');
  const diff = Math.round((new Date(selectedDate) - new Date(todayISO)) / 86400000);
  const label = DAYS[d.getDay()] + ', ' + MOS[d.getMonth()] + ' ' + d.getDate();

  title.textContent = label;
  if (diff === 0) pill.textContent = 'Today';
  else if (diff === 1) pill.textContent = 'Tomorrow';
  else if (diff === -1) pill.textContent = 'Yesterday';
  else if (diff < 0) pill.textContent = 'Past';
  else pill.textContent = 'Upcoming';
}

// ── Header ───────────────────────────────────────────────────────
function renderHeader() {
  const h = new Date().getHours();
  if (selectedDate === todayISO) {
    document.getElementById('hd-sub').textContent =
      h < 12 ? 'Good morning.' : h < 17 ? 'Good afternoon.' : 'Good evening.';
  } else {
    const diff = Math.round((new Date(selectedDate) - new Date(todayISO)) / 86400000);
    const d = new Date(selectedDate + 'T12:00:00');
    const dayLabel = DAYS[d.getDay()] + ', ' + MOS[d.getMonth()] + ' ' + d.getDate();
    document.getElementById('hd-sub').textContent =
      diff < 0 ? 'Past — ' + dayLabel : 'Upcoming — ' + dayLabel;
  }
}

// ── Render ───────────────────────────────────────────────────────
function render() {
  updateInputLock();
  updateDayPanel();
  renderPlannerCalendar();

  const dayTasks = tasks.filter(t => t.date === selectedDate);
  const total    = dayTasks.length;
  const doneN    = dayTasks.filter(t => t.d).length;
  const activeN  = total - doneN;

  const prog = document.getElementById('prog');
  if (total > 0) {
    prog.style.display = '';
    document.getElementById('prog-fill').style.width = Math.round(doneN / total * 100) + '%';
    document.getElementById('prog-frac').textContent  = doneN + ' of ' + total;
  } else {
    prog.style.display = 'none';
  }

  document.getElementById('ft-left').innerHTML = '<b>' + activeN + '</b> task' + (activeN !== 1 ? 's' : '') + ' remaining';
  document.getElementById('btn-clear').disabled = doneN === 0;

  const list = document.getElementById('list');
  list.innerHTML = '';

  if (!dayTasks.length) {
    list.innerHTML = `
      <div class="empty">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
          <rect x="3" y="4" width="18" height="17" rx="3"/>
          <path d="M9 12l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <p class="empty-h">${selectedDate > todayISO ? 'Nothing planned yet' : 'Nothing here yet'}</p>
        <p class="empty-p">Add your first task for this day.</p>
      </div>`;
    return;
  }

  const pending  = dayTasks.filter(t => !t.d);
  const finished = dayTasks.filter(t =>  t.d);
  pending.forEach(t => list.appendChild(mkItem(t)));
  if (pending.length && finished.length) {
    const d = document.createElement('div');
    d.className = 'divider';
    d.innerHTML = '<div class="divider-line"></div><span class="divider-tag">Completed</span><div class="divider-line"></div>';
    list.appendChild(d);
  }
  finished.forEach(t => list.appendChild(mkItem(t)));
}

function mkItem(task) {
  const el = document.createElement('div');
  el.className = 'item' + (task.d ? ' done' : '');
  el.innerHTML = `
    <label class="cb-wrap">
      <input type="checkbox" ${task.d ? 'checked' : ''}>
      <span class="cb-face"></span>
    </label>
    <span class="tx">${esc(task.t)}</span>
    <div class="item-actions">
      <button class="act-btn edit" title="Edit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
      <button class="act-btn del" title="Delete">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>`;

  const checkbox = el.querySelector('input');
  
  // Toggle checkbox when clicking the task or text (not action buttons)
  el.addEventListener('click', (e) => {
    // Don't toggle if clicking edit/delete buttons
    if (e.target.closest('.item-actions')) return;
    checkbox.checked = !checkbox.checked;
    checkbox.dispatchEvent(new Event('change', { bubbles: true }));
  });

  checkbox.addEventListener('change', e => {
    const t = tasks.find(x => x.id === task.id);
    if (t) { t.d = e.target.checked; save(); render(); renderCal(); }
  });
  el.querySelector('.edit').addEventListener('click', () => startEdit(el, task));
  el.querySelector('.del').addEventListener('click', () => {
    el.classList.add('bye');
    el.addEventListener('animationend', () => {
      tasks = tasks.filter(x => x.id !== task.id);
      save(); render(); renderCal();
    }, { once: true });
  });
  return el;
}

function startEdit(el, task) {
  el.classList.add('editing');
  const txEl  = el.querySelector('.tx');
  const actEl = el.querySelector('.item-actions');

  const input = document.createElement('input');
  input.className = 'edit-input'; input.type = 'text'; input.value = task.t;
  input.maxLength = 200; input.autocomplete = 'off'; input.spellcheck = false;
  txEl.replaceWith(input);
  input.focus(); input.select();

  actEl.innerHTML = `
    <button class="act-btn save" title="Save (Enter)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </button>
    <button class="act-btn cancel" title="Cancel (Esc)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>`;

  const commit = () => {
    const val = input.value.trim();
    if (val && val !== task.t) { const t = tasks.find(x => x.id === task.id); if (t) { t.t = val; save(); } }
    render();
  };
  actEl.querySelector('.save').addEventListener('click', commit);
  actEl.querySelector('.cancel').addEventListener('click', render);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { e.preventDefault(); render(); }
  });
}

// ── Add ──────────────────────────────────────────────────────────
function add() {
  if (isPastDate(selectedDate)) return;
  const v = document.getElementById('ti').value.trim();
  if (!v) { document.getElementById('ti').focus(); return; }
  tasks.unshift({ id: Date.now().toString(36), t: v, d: false, date: selectedDate });
  save(); render(); renderCal();
  document.getElementById('ti').value = '';
  document.getElementById('ti').focus();
}

document.getElementById('btn-add').addEventListener('click', add);
document.getElementById('ti').addEventListener('keydown', e => { if (e.key === 'Enter') add(); });
document.getElementById('btn-clear').addEventListener('click', () => {
  tasks = tasks.filter(t => !(t.d && t.date === selectedDate));
  save(); render(); renderCal();
});

// ── Init ─────────────────────────────────────────────────────────
updateDateBtn();
renderHeader();
renderCal();
renderPlannerCalendar();
render();

// Hide splash screen with elegant opening animation
setTimeout(() => {
  const splash = document.getElementById('splash');
  if (splash) {
    splash.classList.add('hidden');
  }
}, 1600);
</script>
